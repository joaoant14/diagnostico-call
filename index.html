<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inteligência Persuasiva — Diagnóstico</title>

<!-- Fontes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0E1413;
  --surface:#161F1D;
  --surface-2:#1C2624;
  --border:#26332F;
  --border-active:#58D6C4;
  --text:#EAF2F0;
  --muted:#8A9B97;
  --accent:#58D6C4;
  --accent-deep:#3FB8A8;
  --snap:cubic-bezier(.65,0,.35,1);
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 20px 48px;
}

/* ---------- top bar ---------- */
.brand{
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;
  font-size:14px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:28px;
}
.brand b{color:var(--accent);font-weight:700}

/* ---------- progress ---------- */
.progress{
  display:flex;
  gap:6px;
  width:100%;
  max-width:560px;
  margin-bottom:40px;
}
.seg{
  flex:1;
  height:4px;
  border-radius:99px;
  background:var(--surface-2);
  overflow:hidden;
}
.seg i{
  display:block;
  height:100%;
  width:0;
  background:var(--accent);
  border-radius:99px;
  transition:width .45s var(--snap);
}
.seg.done i{width:100%}

/* ---------- card / stage ---------- */
.stage{
  width:100%;
  max-width:560px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.q{
  display:none;
  animation:enter .45s var(--snap) both;
}
.q.active{display:block}

@keyframes enter{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

.q .eyebrow{
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:.1em;
  color:var(--accent);
  margin-bottom:14px;
}
.q h2{
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;
  font-size:clamp(24px,5vw,32px);
  line-height:1.18;
  margin-bottom:8px;
}
.q .hint{
  color:var(--muted);
  font-size:15px;
  margin-bottom:28px;
}

/* text input */
.field input{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:2px solid var(--border);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-size:22px;
  padding:14px 2px;
  transition:border-color .3s var(--snap);
}
.field input::placeholder{color:#46544F}
.field input:focus{outline:none;border-color:var(--accent)}

/* choices */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;
  align-items:center;
  gap:14px;
  text-align:left;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:18px 18px;
  color:var(--text);
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:border-color .2s var(--snap),background .2s var(--snap),transform .15s var(--snap);
}
.opt:hover{border-color:#3a4a46;background:var(--surface-2)}
.opt:active{transform:scale(.99)}
.opt.sel{
  border-color:var(--accent);
  background:rgba(88,214,196,.08);
}
.opt .dot{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  position:relative;
  transition:border-color .2s var(--snap);
}
.opt.sel .dot{border-color:var(--accent)}
.opt.sel .dot::after{
  content:"";position:absolute;inset:3px;border-radius:50%;
  background:var(--accent);
}

/* continue button */
.cta{
  margin-top:32px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:var(--accent);
  color:#0A0F0E;
  border:none;
  border-radius:99px;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:16px;
  padding:16px 30px;
  cursor:pointer;
  transition:background .2s var(--snap),transform .15s var(--snap),opacity .2s;
}
.cta:hover{background:var(--accent-deep)}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.35;cursor:not-allowed}

.err{
  color:#FF8B7B;
  font-size:14px;
  margin-top:12px;
  min-height:18px;
}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important}
  .seg i{transition:none}
}
</style>
</head>
<body>

<div class="brand">Inteligência <b>Persuasiva</b></div>

<div class="progress" id="progress"></div>

<!-- ===================== QUIZ ===================== -->
<div class="stage" id="stage"></div>

<script>
/* ===================== CONFIG ===================== */
const CALENDLY_URL = "https://calendly.com/joao-oguri-ribeiro/new-meeting";
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyhtN0xZNEkrAeUevgPsFXCA30aFPijTDB7HzGnNO1Ja36tTegTLmiO-GYVfe58Zxv1/exec";

/* ===================== PERGUNTAS ===================== */
const QUESTIONS = [
  { key:"nome",  type:"text", inputType:"text",
    eyebrow:"PRA COMEÇAR", q:"Qual é o teu nome?", placeholder:"Teu nome" },

  { key:"instagram", type:"text", inputType:"text",
    eyebrow:"PERFIL", q:"Qual é o teu @ do Instagram?", placeholder:"@seuusuario" },

  { key:"email", type:"text", inputType:"email",
    eyebrow:"CONTATO", q:"Teu melhor email?", placeholder:"voce@email.com" },

  { key:"telefone", type:"text", inputType:"tel",
    eyebrow:"CONTATO", q:"Teu telefone com DDD?", placeholder:"(11) 99999-9999" },

  { key:"faturamento", type:"choice",
    eyebrow:"SOBRE TEU NEGÓCIO", q:"Quanto você fatura por mês hoje?",
    options:[
      "Ainda não faturo",
      "Até R$ 5 mil / mês",
      "R$ 5 mil a R$ 20 mil / mês",
      "R$ 20 mil a R$ 50 mil / mês",
      "Acima de R$ 50 mil / mês"
    ] },

  { key:"objetivo", type:"choice",
    eyebrow:"OBJETIVO", q:"Qual teu principal objetivo com o Instagram?",
    options:[
      "Vender mais",
      "Construir mais autoridade",
      "Gerar mais leads qualificados",
      "Crescer a base de seguidores",
      "Aumentar engajamento"
    ] },

  { key:"vende_hoje", type:"choice",
    eyebrow:"SITUAÇÃO ATUAL", q:"Teu Instagram gera vendas hoje?",
    options:[
      "Sim, é meu principal canal de vendas",
      "Sim, mas gera poucas vendas",
      "Não, quase nenhuma venda no meu Instagram",
      "Não vendi nada ainda"
    ] },

  { key:"frustracao", type:"choice",
    eyebrow:"O QUE TRAVA", q:"O que mais te frustra no Instagram?",
    options:[
      "Posto e ninguém vê",
      "Tenho seguidores mas não converto em vendas",
      "Não sei o que postar",
      "Não consigo manter constância",
      "Pouquíssimo engajamento"
    ] }
];

/* ===================== ESTADO ===================== */
const answers = {};
let idx = 0;

const stage = document.getElementById("stage");
const progressEl = document.getElementById("progress");

/* progress segments */
QUESTIONS.forEach(()=>{
  const s = document.createElement("div");
  s.className = "seg";
  s.innerHTML = "<i></i>";
  progressEl.appendChild(s);
});
const segs = [...progressEl.children];

function updateProgress(){
  segs.forEach((s,i)=> s.classList.toggle("done", i < idx));
}

/* ===================== RENDER ===================== */
function render(){
  const Q = QUESTIONS[idx];
  stage.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.className = "q active";

  let html = `<div class="eyebrow">${Q.eyebrow}</div><h2>${Q.q}</h2>`;
  if (Q.hint) html += `<div class="hint">${Q.hint}</div>`;

  const isLast = (idx === QUESTIONS.length - 1);

  if (Q.type === "text"){
    html += `
      <div class="field">
        <input id="inp" type="${Q.inputType}" placeholder="${Q.placeholder}"
               value="${answers[Q.key]||""}" autocomplete="on">
      </div>
      <div class="err" id="err"></div>
      <button class="cta" id="next">${isLast ? "Agendar minha call →" : "Continuar →"}</button>`;
  } else {
    html += `<div class="opts">` +
      Q.options.map((o,i)=>`
        <button class="opt ${answers[Q.key]===o?'sel':''}" data-val="${o}">
          <span class="dot"></span><span>${o}</span>
        </button>`).join("") +
      `</div><div class="err" id="err"></div>`;
    if (isLast)
      html += `<button class="cta" id="agendarBtn" ${answers[Q.key]?'':'disabled'}>Agendar minha call →</button>`;
  }

  wrap.innerHTML = html;
  stage.appendChild(wrap);
  updateProgress();

  if (Q.type === "text"){
    const inp = document.getElementById("inp");
    inp.focus();
    if (Q.inputType === "tel"){
      inp.addEventListener("input", function(){
        let d = inp.value.replace(/\D/g,"").slice(0,11);
        let out = d;
        if (d.length > 2 && d.length <= 6)
          out = `(${d.slice(0,2)}) ${d.slice(2)}`;
        else if (d.length > 6 && d.length <= 10)
          out = `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
        else if (d.length > 10)
          out = `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
        inp.value = out;
      });
    }
    document.getElementById("next").onclick = ()=>submitText(Q,inp);
    inp.onkeydown = e=>{ if(e.key==="Enter") submitText(Q,inp); };
  } else {
    stage.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=>{
        stage.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
        btn.classList.add("sel");
        answers[Q.key] = btn.dataset.val;
        if (isLast){
          const ag = document.getElementById("agendarBtn");
          if (ag) ag.disabled = false;
        } else {
          setTimeout(advance, 260); // deixa a seleção aparecer antes de avançar
        }
      };
    });
    if (isLast){
      const ag = document.getElementById("agendarBtn");
      if (ag) ag.onclick = ()=>{ if(answers[Q.key]) finish(); };
    }
  }
}

/* ===================== VALIDAÇÃO TEXTO ===================== */
function submitText(Q, inp){
  const v = inp.value.trim();
  const err = document.getElementById("err");
  if(!v){ err.textContent = "Preenche esse campo pra continuar."; inp.focus(); return; }
  if(Q.inputType==="email" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
    err.textContent = "Esse email não parece certo. Confere?"; inp.focus(); return;
  }
  if(Q.inputType==="tel"){
    const digitos = v.replace(/\D/g,"");
    if(digitos.length < 10){
      err.textContent = "Coloca o telefone com DDD (ex: 11 99999-9999)."; inp.focus(); return;
    }
  }
  answers[Q.key] = v;
  if (idx === QUESTIONS.length - 1) finish();
  else advance();
}

/* ===================== AVANÇAR ===================== */
function advance(){
  idx++;
  if(idx < QUESTIONS.length){
    render();
  } else {
    finish();
  }
}

/* ===================== ENVIA LEAD PRA PLANILHA ===================== */
function postLead(){
  if(!SHEET_URL || SHEET_URL.indexOf("http") !== 0) return;
  try{
    fetch(SHEET_URL, {
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(answers)
    });
  }catch(e){}
}

/* ===================== AGENDA (link direto, sem embed) ===================== */
function buildCalendlyUrl(){
  const resumo = [
    `Instagram: ${answers.instagram||"-"}`,
    `Telefone: ${answers.telefone||"-"}`,
    `Faturamento: ${answers.faturamento||"-"}`,
    `Objetivo: ${answers.objetivo||"-"}`,
    `Vende hoje?: ${answers.vende_hoje||"-"}`,
    `Frustracao: ${answers.frustracao||"-"}`
  ].join(" | ");
  const p = new URLSearchParams({
    name: answers.nome || "",
    email: answers.email || "",
    a1: resumo
  });
  return CALENDLY_URL + "?" + p.toString();
}

function finish(){
  updateProgress();
  postLead();
  // hook p/ pixel: evento de intenção de agendamento
  // if(window.fbq) fbq('track','Schedule');
  window.location.href = buildCalendlyUrl();
}

/* start */
render();
</script>
</body>
</html>
